version: '3.9'

services:
    cassandra:
        image: cassandra:latest
        container_name: cassandra_node
        ports:
            - '9042:9042'
        environment:
            CASSANDRA_CLUSTER_NAME: 'MyCluster'
            CASSANDRA_NUM_TOKENS: '256'
            CASSANDRA_START_RPC: 'true'
        volumes:
            - cassandra_data:/var/lib/cassandra
        networks:
            - cassandra_network

volumes:
    cassandra_data:

networks:
    cassandra_network:
        driver: bridge
